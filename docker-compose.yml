version: '3.8'

services:
  cultreboat:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_CONTACT_EMAIL=${VITE_CONTACT_EMAIL:-hello@cultreboat.in}
      - VITE_CONTACT_PHONE=${VITE_CONTACT_PHONE:-+1 (234) 567-890}
      - VITE_FACEBOOK_URL=${VITE_FACEBOOK_URL:-https://facebook.com/cultreboat}
      - VITE_INSTAGRAM_URL=${VITE_INSTAGRAM_URL:-https://instagram.com/cultreboat}
      - VITE_LINKEDIN_URL=${VITE_LINKEDIN_URL:-https://linkedin.com/company/cultreboat}
      - VITE_API_URL=${VITE_API_URL:-https://api.cultreboat.in}
      - VITE_GOOGLE_ANALYTICS_ID=${VITE_GOOGLE_ANALYTICS_ID}
      - VITE_HOTJAR_ID=${VITE_HOTJAR_ID}
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
