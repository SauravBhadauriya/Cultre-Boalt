<html lang="en">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Cultre Boat - Creative Branding & Digital Agency</title>
    <meta name="description" content="Transform your brand with Cultre Boat. We specialize in creative branding, PR & communications, and social media strategy. Let's build your story." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cultreboat.in/" />
    <meta property="og:title" content="Cultre Boat - Creative Branding & Digital Agency" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://cultreboat.in/" />
    <meta property="twitter:title" content="Cultre Boat - Creative Branding & Digital Agency" />
    <meta property="twitter:description" content="Transform your brand with Cultre Boat. We specialize in creative branding, PR & communications, and social media strategy." />
    <meta property="twitter:image" content="https://cultreboat.in/og-image.jpg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://cultreboat.in/" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        "https://linkedin.com/company/cultreboat"
      ],
      "contactPoint": {
        "@type": "ContactPoint",

        "email": "hello@cultreboat.in",

      }
    }
    </script>
  </head>
